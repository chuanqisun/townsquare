<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TownSquare - Pixel Art Generator</title>
  </head>
  <body>
    <header class="app-header">
      <div class="logo-area">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
          <path d="M9 3v18M15 3v18M3 9h18M3 15h18" />
        </svg>
        <h1>TownSquare</h1>
      </div>
      <p class="subtitle">Procedural 32x32 Pixel Art World Visualizer</p>
    </header>

    <main class="app-container">
      <section class="controls-card">
        <h2>Active Mode</h2>
        <div class="mode-toggle-container">
          <button id="editModeBtn" class="btn mode-btn active">
            <svg class="mode-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
            </svg>
            Edit Mode
          </button>
          <button id="playModeBtn" class="btn mode-btn">
            <svg class="mode-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="5 3 19 12 5 21 5 3" />
            </svg>
            Play Mode
          </button>
        </div>

        <hr class="divider" />

        <h2>World Settings</h2>
        <div class="control-row">
          <button id="regenFloorBtn" class="btn primary">Generate Floor</button>
        </div>

        <hr class="divider" />

        <h2>Next Character</h2>
        <div class="preview-box-container">
          <div id="charPreviewBox" class="preview-box" title="Click to randomize!">
            <character-element id="previewChar" seed="char-init" background></character-element>
          </div>
          <p class="preview-help">Click to randomize. Drag onto map to spawn!</p>
        </div>
      </section>

      <section class="viewport-card">
        <div class="viewport-header">
          <span class="status-indicator">● Active Sandbox</span>
          <span class="dimensions-tag" id="dimensionsLabel">1024 x 640 px (16x10 tiles, 2x scale)</span>
        </div>
        <div class="viewport-canvas-wrapper">
          <div id="gameBoard" class="game-board">
            <floor-element id="floor" seed="townsquare-001" width="16" height="10"></floor-element>
            <!-- Characters will be dynamically placed here -->
          </div>
        </div>
      </section>
    </main>

    <footer class="app-footer">
      <p>Powered by Web Components & Seeded mulberry32 RNG. Created with ❤️ for TownSquare.</p>
    </footer>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
